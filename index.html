<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom's Task List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #1C2340;
      --navy-dark:   #0f1729;
      --green:       #007a33;
      --green-dark:  #00662a;
      --text:        #1C2340;
      --text-muted:  #6b7280;
      --white:       #ffffff;
      --done-text:   #4b5563;
      --high:        #991b1b;
      --medium:      #92400e;
      --low:         #065f46;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1C2340 0%, #0c1020 60%, #111827 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 52px 16px 80px;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Brand ───────────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-logo {
      color: white;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-logo em {
      font-style: normal;
      color: var(--green);
    }

    .brand-tagline {
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    /* ── Card Header ─────────────────────────────────────────── */
    .card-header {
      background: var(--navy);
      padding: 22px 24px 0;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .card-title {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    #task-count {
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Progress Bar ────────────────────────────────────────── */
    .progress-wrap {
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
    }

    #progress-bar {
      height: 100%;
      background: var(--green);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* ── Add Form ────────────────────────────────────────────── */
    #add-form {
      padding: 16px 20px;
      background: var(--white);
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    #todo-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      color: var(--text);
      background: #f9fafb;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    #todo-input::placeholder { color: #9ca3af; }

    #todo-input:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 3px rgba(0, 177, 64, 0.12);
    }

    #btn-add {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    #btn-add:hover  { background: var(--green-dark); }
    #btn-add:active { transform: scale(0.96); }

    #btn-add:focus-visible {
      outline: 3px solid rgba(0, 177, 64, 0.35);
      outline-offset: 2px;
    }

    /* ── Filter Bar ──────────────────────────────────────────── */
    #filter-bar {
      display: flex;
      padding: 10px 20px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      gap: 4px;
    }

    .filter-btn {
      background: none;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: inherit;
      font-weight: 500;
    }

    .filter-btn.active {
      background: var(--navy);
      color: white;
    }

    .filter-btn:not(.active):hover {
      background: #f3f4f6;
      color: var(--text);
    }

    .filter-btn:focus-visible {
      outline: 2px solid rgba(28, 35, 64, 0.35);
      outline-offset: 2px;
    }

    /* ── Stats ───────────────────────────────────────────────── */
    #stats {
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-muted);
      background: #fafafa;
      border-bottom: 1px solid #f3f4f6;
      font-weight: 500;
    }

    /* ── Todo List ───────────────────────────────────────────── */
    #todo-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
    }

    #todo-list::-webkit-scrollbar { width: 4px; }
    #todo-list::-webkit-scrollbar-track { background: #f8fafc; }
    #todo-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 13px 20px;
      background: white;
      border-bottom: 1px solid #f3f4f6;
      gap: 12px;
      transition: background 0.1s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: #f9fafb; }
    .todo-item.done { opacity: 1; }

    /* ── Checkbox ────────────────────────────────────────────── */
    .todo-checkbox {
      width: 24px;
      height: 24px;
      accent-color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-checkbox:focus-visible {
      outline: 2px solid rgba(0, 177, 64, 0.4);
      outline-offset: 2px;
    }

    /* ── Todo Text ───────────────────────────────────────────── */
    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    /* ── Priority Badges ─────────────────────────────────────── */
    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .priority-high   { background: #fee2e2; color: var(--high); }
    .priority-medium { background: #fef3c7; color: var(--medium); }
    .priority-low    { background: #d1fae5; color: var(--low); }

    /* ── Delete Button ───────────────────────────────────────── */
    .btn-delete {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      min-width: 24px;
      min-height: 24px;
      padding: 4px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.7;
      transition: color 0.15s, opacity 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ef4444; background: #fee2e2; }
    .todo-item:hover .btn-delete,
    .todo-item:focus-within .btn-delete,
    .btn-delete:focus-visible { opacity: 1; }

    .btn-delete:focus-visible {
      outline: 2px solid rgba(239, 68, 68, 0.35);
      outline-offset: 1px;
    }

    /* ── AI Priority Button ──────────────────────────────────── */
    .btn-ai {
      background: none;
      border: 1.5px solid var(--green);
      color: var(--green);
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      flex-shrink: 0;
    }

    .btn-ai:hover { background: var(--green); color: white; }
    .btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty State ─────────────────────────────────────────── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 52px 24px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 22px;
      color: var(--green);
    }

    #empty-state h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    #empty-state p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── AI Spinner ──────────────────────────────────────────── */
    .ai-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--green);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      padding: 14px 20px;
      display: flex;
      justify-content: flex-end;
      background: #fafafa;
      border-top: 1px solid #e5e7eb;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--navy); }

    footer a:focus-visible {
      outline: 2px solid rgba(28, 35, 64, 0.35);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Caption ─────────────────────────────────────────────── */
    .caption {
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="brand">
    <span class="brand-tagline">Tom's Task Manager</span>
  </div>

  <div class="card">

    <div class="card-header">
      <div class="card-title-row">
        <span class="card-title">My Tasks</span>
        <span id="task-count"></span>
      </div>
      <div class="progress-wrap">
        <div
          id="progress-bar"
          role="progressbar"
          aria-label="Completed tasks"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        ></div>
      </div>
    </div>

    <form id="add-form">
      <label for="todo-input" class="sr-only">Task description</label>
      <input
        id="todo-input"
        type="text"
        placeholder="What needs to get done?"
        maxlength="200"
        autocomplete="off"
      />
      <button type="submit" id="btn-add">Add</button>
    </form>

    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
      <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
      <button class="filter-btn" data-filter="done" aria-pressed="false">Done</button>
    </div>

    <div id="stats">0 tasks left</div>

    <ul id="todo-list"></ul>

    <div id="empty-state">
      <div class="empty-icon">✓</div>
      <h3>All clear!</h3>
      <p>Add a task above to get started.</p>
    </div>

    <footer>
      <a href="#" id="options-link">⚙ Settings</a>
    </footer>

  </div>

  <div id="sr-announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <p class="caption">Tasks stored locally in your browser</p>

  <script src="popup.js"></script>
</body>
</html>
