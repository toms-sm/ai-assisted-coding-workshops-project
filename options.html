<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom's Task List — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #1C2340;
      --green:      #00B140;
      --green-dark: #009933;
      --text:       #1C2340;
      --text-muted: #6b7280;
      --white:      #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1C2340 0%, #0c1020 60%, #111827 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 52px 16px 80px;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Brand ───────────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-logo {
      color: white;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-logo em { font-style: normal; color: var(--green); }

    .brand-tagline {
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .card-header {
      background: var(--navy);
      padding: 22px 24px;
    }

    .card-title {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    .card-body { padding: 28px 24px 24px; }

    /* ── Field ───────────────────────────────────────────────── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #f9fafb;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    input[type="password"]::placeholder { color: #9ca3af; }

    input[type="password"]:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 3px rgba(0, 177, 64, 0.12);
    }

    /* ── Actions ─────────────────────────────────────────────── */
    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    button[type="submit"] {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover  { background: var(--green-dark); }
    button[type="submit"]:active { transform: scale(0.96); }

    #save-status {
      font-size: 13px;
      color: var(--green);
      font-weight: 500;
      min-height: 20px;
    }

    /* ── Back link ───────────────────────────────────────────── */
    .caption { margin-top: 20px; font-size: 12px; }

    .caption a {
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .caption a:hover { color: rgba(255, 255, 255, 0.7); }
  </style>
</head>
<body>

  <div class="brand">
    <span class="brand-tagline">Tom's</span>
    <span class="brand-tagline">Settings</span>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Settings</span>
    </div>
    <div class="card-body">
      <form id="settings-form">
        <div class="field">
          <label for="api-key-input">Anthropic API Key</label>
          <p class="hint">Used for AI priority suggestions (Task 5). Stored locally in your browser — never sent anywhere else.</p>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
        </div>
        <div class="actions">
          <button type="submit">Save</button>
          <p id="save-status"></p>
        </div>
      </form>
    </div>
  </div>

  <p class="caption"><a href="index.html">← Back to tasks</a></p>

  <script src="options.js"></script>
</body>
</html>
